<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3학년 퀴즈 - 돈암초등학교</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF9F0;
  --card: #FFFFFF;
  --purple: #6C5CE7;
  --purple-light: #A29BFE;
  --purple-pale: #EDE9FF;
  --teal: #00B894;
  --teal-pale: #D4F5ED;
  --coral: #FF7675;
  --coral-pale: #FFE5E5;
  --amber: #FDCB6E;
  --amber-pale: #FFF5D6;
  --blue: #0984E3;
  --blue-pale: #DCF0FF;
  --pink: #E84393;
  --pink-pale: #FFE0F0;
  --gold: #F39C12;
  --text: #2D3436;
  --text2: #636E72;
  --text3: #B2BEC3;
  --border: #F0E8FF;
  --radius: 20px;
  --radius-sm: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); font-family: 'Nanum Gothic', sans-serif; color: var(--text); }
body { display: flex; justify-content: center; min-height: 100vh; }
.app { width: 100%; max-width: 430px; min-height: 100vh; background: var(--bg); }

.screen { display: none; flex-direction: column; min-height: 100vh; animation: fadeIn 0.25s ease; }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ── HOME ── */
.home-top {
  background: var(--purple); padding: 52px 24px 28px;
  position: relative; overflow: hidden;
}
.home-top::before { content:''; position:absolute; width:200px; height:200px; background:var(--purple-light); border-radius:50%; top:-60px; right:-50px; opacity:.4; }
.home-top::after  { content:''; position:absolute; width:120px; height:120px; background:var(--purple-light); border-radius:50%; bottom:-30px; left:30px; opacity:.25; }
.home-greeting { font-size:13px; color:var(--purple-pale); position:relative; z-index:1; }
.home-title { font-family:'Jua',sans-serif; font-size:26px; color:#fff; line-height:1.3; position:relative; z-index:1; margin-top:2px; }
.home-date  { font-size:12px; color:var(--purple-pale); margin-top:4px; position:relative; z-index:1; }
.streak-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.2); color:#fff; font-size:12px; font-weight:700; padding:5px 12px; border-radius:30px; margin-top:12px; position:relative; z-index:1; }

/* 포인트 박스 */
.point-box {
  margin: 16px 20px 0;
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  border: 1.5px solid #F5EDFF;
  display: flex; gap: 0;
}
.point-cell { flex:1; text-align:center; }
.point-cell + .point-cell { border-left: 1px solid #EDE8FF; }
.point-label { font-size:11px; color:var(--text2); margin-bottom:4px; }
.point-val { font-family:'Jua',sans-serif; font-size:26px; color:var(--purple); }
.point-unit { font-size:11px; color:var(--text2); margin-left:2px; }

.total-progress {
  margin: 12px 20px 0; background:var(--card);
  border-radius:var(--radius); padding:14px 18px; border:1.5px solid var(--border);
}
.tp-label { font-size:12px; color:var(--text2); margin-bottom:6px; }
.tp-row { display:flex; align-items:center; gap:10px; }
.tp-bar-bg { flex:1; height:7px; background:#F0E8FF; border-radius:4px; overflow:hidden; }
.tp-bar-fill { height:100%; background:var(--purple); border-radius:4px; transition:width .5s cubic-bezier(.4,0,.2,1); }
.tp-pct { font-size:13px; font-weight:800; color:var(--purple); min-width:32px; text-align:right; }

.section-label { font-size:13px; font-weight:700; color:var(--text2); padding:16px 20px 8px; }
.subj-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 20px 16px; }
.subj-card {
  background:var(--card); border-radius:var(--radius); padding:16px 14px;
  border:1.5px solid #F5F0FF; cursor:pointer;
  transition:transform .15s; position:relative; overflow:hidden;
}
.subj-card:active { transform:scale(0.96); }
.subj-card.done-today { border-color:#B7E4D0; }
.done-check { position:absolute; top:10px; right:10px; font-size:16px; }
.subj-icon-wrap { width:44px; height:44px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:8px; }
.subj-name { font-family:'Jua',sans-serif; font-size:15px; color:var(--text); }
.subj-count { font-size:11px; color:var(--text2); margin-top:2px; }
.subj-best { font-size:11px; font-weight:800; margin-top:4px; }
.subj-bar-bg { height:3px; background:#F0EEFF; border-radius:2px; margin-top:8px; overflow:hidden; }
.subj-bar-fill { height:100%; border-radius:2px; transition:width .5s; }

/* history btn */
.hist-btn {
  margin: 4px 20px 24px; width: calc(100% - 40px);
  padding: 13px; background: var(--card);
  border: 1.5px solid #E8E0FF; border-radius: var(--radius-sm);
  font-family:'Nanum Gothic',sans-serif; font-size:14px; font-weight:700;
  color: var(--purple); cursor:pointer;
  transition: background .12s;
}
.hist-btn:active { background: var(--purple-pale); }

/* ── QUIZ ── */
.quiz-header { display:flex; align-items:center; gap:12px; padding:52px 20px 14px; background:var(--card); border-bottom:1.5px solid #F5F0FF; }
.back-btn { width:40px; height:40px; border-radius:12px; border:1.5px solid #E8E0FF; background:var(--bg); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--purple); font-weight:800; transition:background .12s, transform .1s; }
.back-btn:active { background:var(--purple-pale); transform:scale(.95); }
.quiz-hdr-title { flex:1; font-family:'Jua',sans-serif; font-size:17px; color:var(--text); }
.score-chip { background:var(--purple-pale); color:var(--purple); font-size:13px; font-weight:800; padding:4px 12px; border-radius:30px; }

.qz-progress { padding:12px 20px 0; background:var(--card); }
.qz-dots { display:flex; gap:5px; margin-bottom:5px; }
.qz-dot { flex:1; height:5px; border-radius:3px; background:#F0EEFF; transition:background .3s; }
.qz-dot.done { background:var(--purple); }
.qz-dot.current { background:var(--purple-light); }
.qz-step { font-size:12px; color:var(--text2); padding-bottom:12px; }

.q-area { flex:1; overflow-y:auto; padding:14px 20px 20px; }
.q-card { background:var(--card); border-radius:var(--radius); padding:20px 18px; border:1.5px solid #F5F0FF; margin-bottom:14px; }
.q-text { font-size:16px; font-weight:700; line-height:1.65; color:var(--text); white-space:pre-wrap; }

.opts-list { display:flex; flex-direction:column; gap:9px; }
.opt-btn {
  width:100%; text-align:left; padding:14px 16px;
  background:var(--card); border:1.5px solid #EDE9FF; border-radius:var(--radius-sm);
  font-size:14px; font-family:'Nanum Gothic',sans-serif; font-weight:700; color:var(--text);
  cursor:pointer; line-height:1.5;
  transition:background .12s, border-color .12s, transform .1s;
  display:flex; align-items:center; gap:10px;
}
.opt-num { width:28px; height:28px; border-radius:8px; background:var(--purple-pale); color:var(--purple); font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .12s, color .12s; }
.opt-btn:active:not(:disabled) { transform:scale(.98); background:#F9F6FF; }
.opt-btn.correct { background:var(--teal-pale); border-color:var(--teal); }
.opt-btn.correct .opt-num { background:var(--teal); color:#fff; }
.opt-btn.wrong { background:var(--coral-pale); border-color:var(--coral); }
.opt-btn.wrong .opt-num { background:var(--coral); color:#fff; }
.opt-btn:disabled { cursor:default; }

.fb-card { padding:12px 14px; border-radius:var(--radius-sm); margin-top:12px; font-size:13px; font-weight:700; line-height:1.6; display:flex; gap:8px; align-items:flex-start; }
.fb-card.correct { background:var(--teal-pale); color:#006954; border:1.5px solid var(--teal); }
.fb-card.wrong { background:var(--coral-pale); color:#c0392b; border:1.5px solid var(--coral); }
.fb-icon { font-size:18px; flex-shrink:0; }

.bottom-bar { padding:14px 20px 32px; background:var(--card); border-top:1.5px solid #F5F0FF; }
.next-btn { width:100%; padding:15px; background:var(--purple); border:none; border-radius:var(--radius-sm); color:#fff; font-family:'Jua',sans-serif; font-size:16px; cursor:pointer; transition:background .12s, transform .1s, opacity .12s; }
.next-btn:active:not(:disabled) { transform:scale(.98); background:#5A4ED1; }
.next-btn:disabled { background:#E0D8FF; color:var(--purple-light); cursor:default; }

/* ── RESULT ── */
.result-top { background:linear-gradient(150deg,var(--purple) 0%,#9B59B6 100%); padding:52px 24px 36px; text-align:center; position:relative; overflow:hidden; }
.result-top::before { content:''; position:absolute; width:250px; height:250px; background:rgba(255,255,255,.1); border-radius:50%; top:-80px; right:-60px; }
.result-stars { font-size:40px; letter-spacing:5px; position:relative; z-index:1; margin-bottom:6px; }
.result-score { font-family:'Jua',sans-serif; font-size:60px; color:#fff; position:relative; z-index:1; line-height:1; }
.result-sub { font-size:13px; color:var(--purple-pale); margin-top:4px; position:relative; z-index:1; }
.result-msg { font-family:'Jua',sans-serif; font-size:18px; color:#fff; margin-top:10px; position:relative; z-index:1; }

/* 포인트 획득 배너 */
.point-banner {
  margin: 14px 20px 0;
  padding: 14px 18px;
  border-radius: var(--radius);
  display:flex; align-items:center; gap:12px;
}
.point-banner.earn  { background:#FFF8E7; border:1.5px solid #F3CC5A; }
.point-banner.none  { background:#F5F5F5; border:1.5px solid #DDD; }
.point-banner-icon { font-size:28px; }
.point-banner-text { flex:1; }
.point-banner-title { font-family:'Jua',sans-serif; font-size:15px; color:var(--text); }
.point-banner-sub   { font-size:12px; color:var(--text2); margin-top:2px; }

.result-body { flex:1; padding:0 20px 20px; overflow-y:auto; }
.wrong-section { background:var(--card); border-radius:var(--radius); padding:16px; border:1.5px solid #F5F0FF; margin-top:14px; }
.wrong-section-title { font-size:13px; font-weight:800; color:var(--text); margin-bottom:10px; }
.wrong-item { padding:8px 0; border-top:1px solid #F5F0FF; font-size:12px; color:var(--text2); line-height:1.7; }
.wrong-ans { color:var(--teal); font-weight:800; }
.result-actions { display:flex; flex-direction:column; gap:9px; margin-top:14px; padding-bottom:8px; }
.r-btn { width:100%; padding:15px; border-radius:var(--radius-sm); font-family:'Jua',sans-serif; font-size:16px; cursor:pointer; transition:transform .1s; }
.r-btn:active { transform:scale(.98); }
.r-btn.primary { background:var(--purple); border:none; color:#fff; }
.r-btn.secondary { background:var(--card); border:1.5px solid #E8E0FF; color:var(--purple); }

/* ── HISTORY ── */
.hist-header { display:flex; align-items:center; gap:12px; padding:52px 20px 16px; background:var(--card); border-bottom:1.5px solid #F5F0FF; }
.hist-title { flex:1; font-family:'Jua',sans-serif; font-size:18px; color:var(--text); }
.hist-body { flex:1; overflow-y:auto; padding:16px 20px 32px; }
.hist-summary {
  background: var(--card); border-radius:var(--radius);
  padding:18px; border:1.5px solid #F5F0FF; margin-bottom:16px;
  display:flex; gap:0;
}
.hist-sum-cell { flex:1; text-align:center; }
.hist-sum-cell + .hist-sum-cell { border-left:1px solid #EDE8FF; }
.hist-sum-label { font-size:11px; color:var(--text2); margin-bottom:4px; }
.hist-sum-val { font-family:'Jua',sans-serif; font-size:28px; color:var(--purple); }
.hist-list-title { font-size:13px; font-weight:700; color:var(--text2); margin-bottom:10px; }
.hist-item {
  background:var(--card); border-radius:var(--radius-sm);
  padding:14px 16px; border:1.5px solid #F5F0FF;
  margin-bottom:9px; display:flex; align-items:center; gap:12px;
}
.hist-item-date { font-size:13px; font-weight:700; color:var(--text); min-width:80px; }
.hist-item-info { flex:1; font-size:12px; color:var(--text2); line-height:1.6; }
.hist-item-pts { font-family:'Jua',sans-serif; font-size:18px; }
.pts-200 { color:#E67E22; }
.pts-100 { color:var(--blue); }
.pts-0   { color:var(--text3); }
.hist-empty { text-align:center; padding:40px 0; color:var(--text3); font-size:14px; }

::-webkit-scrollbar { width:0; }
</style>
</head>
<body>
<div class="app">

  <!-- ── HOME ── -->
  <div id="home" class="screen active">
    <div class="home-top">
      <p class="home-greeting">안녕하세요! 👋</p>
      <h1 class="home-title">3학년 퀴즈</h1>
      <p class="home-date" id="home-date"></p>
      <div class="streak-badge">🔥 오늘도 공부 도전!</div>
    </div>

    <div class="point-box">
      <div class="point-cell">
        <div class="point-label">오늘 포인트</div>
        <div class="point-val" id="pt-today">0<span class="point-unit">P</span></div>
      </div>
      <div class="point-cell">
        <div class="point-label">누적 포인트</div>
        <div class="point-val" id="pt-total">0<span class="point-unit">P</span></div>
      </div>
    </div>

    <div class="total-progress">
      <p class="tp-label">오늘 진도</p>
      <div class="tp-row">
        <div class="tp-bar-bg"><div class="tp-bar-fill" id="total-prog" style="width:0%"></div></div>
        <span class="tp-pct" id="total-pct">0%</span>
      </div>
    </div>

    <p class="section-label">📚 과목 선택</p>
    <div class="subj-grid" id="subj-grid"></div>

    <button class="hist-btn" id="hist-btn">📋 포인트 히스토리 보기</button>
  </div>

  <!-- ── QUIZ ── -->
  <div id="quiz" class="screen">
    <div class="quiz-header">
      <button class="back-btn" id="back-btn">&#8592;</button>
      <span class="quiz-hdr-title" id="qz-title"></span>
      <span class="score-chip" id="qz-score">0점</span>
    </div>
    <div class="qz-progress">
      <div class="qz-dots" id="qz-dots"></div>
      <p class="qz-step" id="qz-step">1 / 5 문제</p>
    </div>
    <div class="q-area" id="q-area">
      <div class="q-card"><p class="q-text" id="q-text"></p></div>
      <div class="opts-list" id="opts-list"></div>
      <div id="fb-area"></div>
    </div>
    <div class="bottom-bar">
      <button class="next-btn" id="next-btn" disabled>다음 문제</button>
    </div>
  </div>

  <!-- ── RESULT ── -->
  <div id="result" class="screen">
    <div class="result-top">
      <div class="result-stars" id="r-stars">⭐⭐⭐</div>
      <div class="result-score" id="r-score">100점</div>
      <div class="result-sub" id="r-sub">5문제 중 5개 정답</div>
      <div class="result-msg" id="r-msg">완벽해요!</div>
    </div>
    <div class="point-banner" id="point-banner">
      <div class="point-banner-icon" id="pb-icon">🏆</div>
      <div class="point-banner-text">
        <div class="point-banner-title" id="pb-title">+200 포인트 획득!</div>
        <div class="point-banner-sub" id="pb-sub">누적 포인트: 0P</div>
      </div>
    </div>
    <div class="result-body">
      <div class="wrong-section" id="wrong-section" style="display:none">
        <p class="wrong-section-title">🔍 틀린 문제 복습</p>
        <div id="wrong-list"></div>
      </div>
      <div class="result-actions">
        <button class="r-btn primary" id="retry-btn">다시 풀기 🔄</button>
        <button class="r-btn secondary" id="home-btn">다른 과목 선택</button>
      </div>
    </div>
  </div>

  <!-- ── HISTORY ── -->
  <div id="history" class="screen">
    <div class="hist-header">
      <button class="back-btn" id="hist-back">&#8592;</button>
      <span class="hist-title">포인트 히스토리</span>
    </div>
    <div class="hist-body">
      <div class="hist-summary">
        <div class="hist-sum-cell">
          <div class="hist-sum-label">총 획득 포인트</div>
          <div class="hist-sum-val" id="hs-total">0<span style="font-size:14px">P</span></div>
        </div>
        <div class="hist-sum-cell">
          <div class="hist-sum-label">학습 일수</div>
          <div class="hist-sum-val" id="hs-days">0<span style="font-size:14px">일</span></div>
        </div>
      </div>
      <p class="hist-list-title">날짜별 기록</p>
      <div id="hist-list"></div>
    </div>
  </div>

</div>
<script>
/* ═══════════════════════════════════════════════
   문제 데이터 (과목당 100문제)
═══════════════════════════════════════════════ */
const SUBJECTS = {
  math: {
    name:"수학", icon:"🔢",
    bg:"#EDE9FF", iconBg:"#CECBF6", barColor:"#6C5CE7",
    qs:[
      {q:"153 + 274 = ?",opts:["417","427","437","447"],ans:1,ex:"153+274=427. 일의 자리부터 차례로 더해요!"},
      {q:"8 × 7 = ?",opts:["54","56","58","63"],ans:1,ex:"8×7=56. 구구단 8단이에요."},
      {q:"24 ÷ 6 = ?",opts:["3","4","5","6"],ans:1,ex:"24÷6=4. 6×4=24이니까요!"},
      {q:"삼각형 세 각의 합은 몇 도?",opts:["90도","180도","270도","360도"],ans:1,ex:"삼각형 세 각의 합은 항상 180도예요!"},
      {q:"356에서 백의 자리 숫자는?",opts:["3","5","6","35"],ans:0,ex:"맨 왼쪽 3이 백의 자리예요. 356=300+50+6"},
      {q:"소수 0.5를 분수로 나타내면?",opts:["1/4","1/3","1/2","2/3"],ans:2,ex:"0.5=5/10=1/2이에요!"},
      {q:"9 × 9 = ?",opts:["72","81","90","63"],ans:1,ex:"9×9=81. 구구단 9단 마지막이에요!"},
      {q:"500 - 237 = ?",opts:["253","263","273","283"],ans:1,ex:"500-237=263. 받아내림에 주의해요!"},
      {q:"정사각형의 네 각은 모두 몇 도?",opts:["45도","60도","90도","120도"],ans:2,ex:"정사각형의 네 각은 모두 직각(90도)이에요!"},
      {q:"1km는 몇 m?",opts:["100m","500m","1000m","10000m"],ans:2,ex:"1km=1000m예요. kilo는 1000을 의미해요!"},
      {q:"3/4 은 전체를 몇 등분한 것 중 몇 개?",opts:["3개 중 4개","4개 중 3개","4개 중 4개","3개 중 3개"],ans:1,ex:"분모 4로 나눈 것 중 3개예요."},
      {q:"1/2 과 2/4 중 더 큰 것은?",opts:["1/2","2/4","같다","비교 불가"],ans:2,ex:"1/2=2/4로 크기가 같아요!"},
      {q:"6 × 8 = ?",opts:["42","48","56","64"],ans:1,ex:"6×8=48. 구구단 6단이에요."},
      {q:"36 ÷ 4 = ?",opts:["7","8","9","10"],ans:2,ex:"36÷4=9. 4×9=36이에요."},
      {q:"482 + 319 = ?",opts:["791","801","811","791"],ans:1,ex:"482+319=801이에요."},
      {q:"703 - 456 = ?",opts:["237","247","257","267"],ans:1,ex:"703-456=247이에요."},
      {q:"7 × 6 = ?",opts:["36","42","48","56"],ans:1,ex:"7×6=42. 구구단 7단이에요."},
      {q:"45 ÷ 9 = ?",opts:["4","5","6","7"],ans:1,ex:"45÷9=5. 9×5=45이에요."},

/* ═══════════════════════════════════════════════
   날짜 & 시드 함수
═══════════════════════════════════════════════ */
function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayLabel() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+days[d.getDay()]+')';
}
function makeSeed(subjKey) {
  const dk = todayKey().replace(/-/g,'');
  let h = parseInt(dk) + subjKey.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  h = ((h>>16)^h)*0x45d9f3b; h = ((h>>16)^h)*0x45d9f3b; return ((h>>16)^h)>>>0;
}
function seededRandom(seed) {
  let s=seed;
  return ()=>{ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; };
}
function seededShuffle(arr, seed) {
  const a=[...arr], rng=seededRandom(seed);
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

/* ═══════════════════════════════════════════════
   localStorage 헬퍼
═══════════════════════════════════════════════ */
function loadState() {
  const raw = localStorage.getItem('quizState');
  const defaultState = { totalPoints:0, history:[], todayKey:'', todayPoints:0, todayDone:{} };
  if(!raw) return defaultState;
  try {
    const s = JSON.parse(raw);
    // 날짜가 바뀌면 오늘 포인트·진도 초기화
    if(s.todayKey !== todayKey()) {
      s.todayKey = todayKey();
      s.todayPoints = 0;
      s.todayDone = {};
    }
    return { ...defaultState, ...s };
  } catch(e) { return defaultState; }
}
function saveState(s) { localStorage.setItem('quizState', JSON.stringify(s)); }

/* ═══════════════════════════════════════════════
   앱 상태
═══════════════════════════════════════════════ */
let state = loadState();
state.todayKey = todayKey(); // 보정
saveState(state);

let curSubj=null, shuffledQs=[], curIdx=0, score=0, wrongQs=[], answered=false;

function $(id){return document.getElementById(id);}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active'); window.scrollTo(0,0);
}

/* ═══════════════════════════════════════════════
   포인트 계산
═══════════════════════════════════════════════ */
function calcTodayAvg() {
  const done = Object.values(state.todayDone);
  if(!done.length) return null;
  return Math.round(done.reduce((a,b)=>a+b,0)/done.length);
}
function allSubjectsDone() {
  return Object.keys(SUBJECTS).every(k => state.todayDone[k] !== undefined);
}
function awardPoints() {
  if(!allSubjectsDone()) return null;
  const dateKey = todayKey();
  const alreadyAwarded = state.history.find(h=>h.date===dateKey);
  if(alreadyAwarded) return null; // 이미 지급됨
  const avg = calcTodayAvg();
  let pts = 0;
  if(avg >= 80) pts = 200;
  else if(avg >= 60) pts = 100;
  state.totalPoints += pts;
  state.todayPoints += pts;
  state.history.unshift({ date:dateKey, avg, pts, detail:Object.assign({},state.todayDone) });
  saveState(state);
  return { pts, avg };
}

/* ═══════════════════════════════════════════════
   홈 화면 빌드
═══════════════════════════════════════════════ */
function buildHome() {
  $('home-date').textContent = '📅 ' + todayLabel();
  $('pt-today').innerHTML = state.todayPoints + '<span class="point-unit">P</span>';
  $('pt-total').innerHTML = state.totalPoints + '<span class="point-unit">P</span>';

  const subjKeys = Object.keys(SUBJECTS);
  const doneCount = subjKeys.filter(k=>state.todayDone[k]!==undefined).length;
  const pct = Math.round(doneCount/subjKeys.length*100);
  $('total-prog').style.width = pct+'%';
  $('total-pct').textContent = pct+'%';

  const grid = $('subj-grid');
  grid.innerHTML = '';
  Object.entries(SUBJECTS).forEach(([key,s])=>{
    const isDone = state.todayDone[key] !== undefined;
    const todayScore = state.todayDone[key] ?? null;
    const card = document.createElement('div');
    card.className = 'subj-card' + (isDone?' done-today':'');
    card.innerHTML = `
      ${isDone?'<span class="done-check">✅</span>':''}
      <div class="subj-icon-wrap" style="background:${s.iconBg}">${s.icon}</div>
      <div class="subj-name">${s.name}</div>
      <div class="subj-count">오늘의 문제 5개</div>
      <div class="subj-best" style="color:${s.barColor}">${todayScore!==null?'오늘 '+todayScore+'점':'도전해보세요!'}</div>
      <div class="subj-bar-bg"><div class="subj-bar-fill" style="background:${s.barColor};width:${todayScore!==null?todayScore:0}%"></div></div>
    `;
    card.onclick = ()=>startQuiz(key);
    grid.appendChild(card);
  });
}

/* ═══════════════════════════════════════════════
   퀴즈 시작
═══════════════════════════════════════════════ */
function startQuiz(key) {
  curSubj=key;
  const s=SUBJECTS[key];
  const seed=makeSeed(key);
  shuffledQs=seededShuffle(s.qs,seed).slice(0,5);
  curIdx=0; score=0; wrongQs=[]; answered=false;
  $('qz-title').textContent=s.icon+' '+s.name;
  $('qz-score').textContent='0점';
  showScreen('quiz');
  renderQ();
}

function renderQ() {
  answered=false;
  const q=shuffledQs[curIdx];
  const total=shuffledQs.length;
  $('qz-step').textContent=(curIdx+1)+' / '+total+' 문제';
  $('next-btn').textContent=curIdx===total-1?'결과 보기 🎉':'다음 문제 →';
  $('next-btn').disabled=true;

  const dots=$('qz-dots'); dots.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='qz-dot'+(i<curIdx?' done':i===curIdx?' current':'');
    dots.appendChild(d);
  }
  $('q-text').textContent=q.q; $('fb-area').innerHTML='';
  const opts=$('opts-list'); opts.innerHTML='';
  const labels=['①','②','③','④'];
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-num">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>pickAnswer(i,btn,q);
    opts.appendChild(btn);
  });
  $('q-area').scrollTop=0;
}

function pickAnswer(idx,btn,q){
  if(answered)return; answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const ok=idx===q.ans;
  btn.classList.add(ok?'correct':'wrong');
  if(!ok) document.querySelectorAll('.opt-btn')[q.ans].classList.add('correct');
  if(ok) score+=20; else wrongQs.push(q);
  $('qz-score').textContent=score+'점';
  const fb=document.createElement('div');
  fb.className='fb-card '+(ok?'correct':'wrong');
  fb.innerHTML=`<span class="fb-icon">${ok?'🎉':'😅'}</span><span>${ok?'정답이에요! ':'아쉬워요! '}${q.ex}</span>`;
  $('fb-area').appendChild(fb);
  $('next-btn').disabled=false;
  setTimeout(()=>{ $('q-area').scrollTo({top:$('q-area').scrollHeight,behavior:'smooth'}); },100);
}

$('next-btn').onclick=()=>{ curIdx++; if(curIdx>=shuffledQs.length) showResult(); else renderQ(); };
$('back-btn').onclick=()=>{ showScreen('home'); buildHome(); };

/* ═══════════════════════════════════════════════
   결과 화면
═══════════════════════════════════════════════ */
function showResult(){
  // 오늘 점수 기록 (최고점만)
  if(state.todayDone[curSubj]===undefined || score>state.todayDone[curSubj]) {
    state.todayDone[curSubj]=score;
    saveState(state);
  }

  showScreen('result');
  const total=shuffledQs.length, correct=total-wrongQs.length;
  $('r-score').textContent=score+'점';
  $('r-sub').textContent=total+'문제 중 '+correct+'개 정답';

  let stars='⭐⭐⭐', msg='완벽해요! 대단해요! 🏆';
  if(score<40){stars='⭐';msg='조금 더 공부해볼까요? 💪';}
  else if(score<80){stars='⭐⭐';msg='잘하고 있어요! 조금만 더! 🌟';}
  $('r-stars').textContent=stars; $('r-msg').textContent=msg;

  // 포인트 배너
  const award = awardPoints();
  const banner=$('point-banner');
  if(award && award.pts>0){
    banner.className='point-banner earn';
    $('pb-icon').textContent=award.pts===200?'🏆':'⭐';
    $('pb-title').textContent='+'+award.pts+' 포인트 획득!';
    $('pb-sub').textContent='평균 '+award.avg+'점 | 누적 '+state.totalPoints+'P';
  } else if(award && award.pts===0){
    banner.className='point-banner none';
    $('pb-icon').textContent='😢';
    $('pb-title').textContent='포인트 없음 (평균 '+award.avg+'점)';
    $('pb-sub').textContent='60점 이상이면 포인트를 받을 수 있어요!';
  } else if(allSubjectsDone()){
    const dateKey=todayKey();
    const already=state.history.find(h=>h.date===dateKey);
    banner.className='point-banner earn';
    $('pb-icon').textContent='✅';
    $('pb-title').textContent='오늘 포인트 이미 지급됨';
    $('pb-sub').textContent='누적 '+state.totalPoints+'P';
  } else {
    const remaining=Object.keys(SUBJECTS).filter(k=>state.todayDone[k]===undefined).length;
    banner.className='point-banner none';
    $('pb-icon').textContent='📚';
    $('pb-title').textContent='남은 과목 '+remaining+'개를 더 풀어요!';
    $('pb-sub').textContent='모든 과목 완료 시 포인트 지급';
  }

  // 틀린 문제
  const ws=$('wrong-section');
  if(wrongQs.length>0){
    ws.style.display='block';
    $('wrong-list').innerHTML=wrongQs.map(q=>
      `<div class="wrong-item">📌 ${q.q}<br><span class="wrong-ans">✅ 정답: ${q.opts[q.ans]}</span></div>`
    ).join('');
  } else ws.style.display='none';
}

$('retry-btn').onclick=()=>startQuiz(curSubj);
$('home-btn').onclick=()=>{ showScreen('home'); buildHome(); };

/* ═══════════════════════════════════════════════
   히스토리 화면
═══════════════════════════════════════════════ */
function buildHistory(){
  $('hs-total').innerHTML=state.totalPoints+'<span style="font-size:14px">P</span>';
  $('hs-days').innerHTML=state.history.length+'<span style="font-size:14px">일</span>';

  const list=$('hist-list');
  if(!state.history.length){
    list.innerHTML='<div class="hist-empty">아직 기록이 없어요.<br>퀴즈를 완료하면 여기에 쌓여요!</div>';
    return;
  }
  list.innerHTML=state.history.map(h=>{
    const cls=h.pts>=200?'pts-200':h.pts>=100?'pts-100':'pts-0';
    const icon=h.pts>=200?'🏆':h.pts>=100?'⭐':'😢';
    return `<div class="hist-item">
      <div class="hist-item-date">${h.date}</div>
      <div class="hist-item-info">평균 ${h.avg}점<br>모든 과목 완료</div>
      <div class="hist-item-pts ${cls}">${icon} ${h.pts>0?'+'+h.pts:'0'}P</div>
    </div>`;
  }).join('');
}

$('hist-btn').onclick=()=>{ buildHistory(); showScreen('history'); };
$('hist-back').onclick=()=>{ showScreen('home'); buildHome(); };

/* 시작 */
buildHome();
</script>
</body>
</html>
